# Ticket system configuration
# https://github.com/masuidrive/ticket.sh

# Directory settings
tickets_dir: "tickets"

# Git settings
default_branch: "main"
branch_prefix: "features/"
repository: "origin"

# Automatically push changes to remote repository during close command
auto_push: true

# Automatically delete remote feature branch after closing ticket
delete_remote_on_close: true

# Success messages
new_success_message: |
  Ticket を作成しました。内容を編集してから `./ticket.sh start <ticket_name>` で作業を開始してください。

start_success_message: |
  @product-delivery-hierarchy.md のプロセスの一部として処理するチケットを開始しました。
  `current-ticket.md` の Why / Acceptance Criteria / Architectural Invariants check / 確定判断 / Out-of-scope を確認してから作業を開始してください。
  判断に迷ったら `product-brief.md` の Constraints / Architectural Invariants を確認。
  PD-C ステップ (Direct flow): C-1 開始前+AC 承認 → C-6 実装 → C-7 品質検証 → C-9 完了検証 → C-10 クローズ

restore_success_message: |

close_success_message: |
  Ticket をクローズしました。
  `./ticket.sh list` で残りの TODO ticket を確認してください。

# Note template — 作業記録用。プロセス通過の証跡はセクション構造が担う
note_content: |
  # Work Notes: $$TICKET_NAME$$

  ## Status: PD-C-1 (Opening)

  ## PD-C-6. 実装ログ
  <!-- 1 agent が investigate + implement + tests を 1 session で完遂する。
       実コードを読みながら直接実装し、設計判断 / scope 拡張・縮小の判断 / 実コードで発見した事実をここに append する。
       commit hash 一覧も記録する (commit cadence 5+)。 -->

  ## PD-C-7. 品質検証結果
  <!-- Devil's Advocate ×1 + codex ×1 の実装後 review 結果を統合。
       Critical/Major → 修正 → テスト → 再レビュー → 「No Critical/Major」まで繰り返す。
       2 round 同種 Critical 再発で root cause 診断 → escalation。
       実装後 review 特有 gate: Ticket 不可侵 / commit cadence 5+ / E2E real API / テスト全件 PASS -->

  ## PD-C-9. プロセスチェックリスト
  PD-C-9 完了検証時にチェックする。
  - [ ] PD-C-7: 品質検証で全 reviewer が Critical/Major = 0 を回答
  - [ ] PD-C-6: implementor が incremental に 5+ commit に分けて切った
  - [ ] PD-C-6: 全テスト (backend / frontend / E2E / SDK) が通った
  - [ ] PD-C-6: `scripts/test-all.sh` 全スイートパス確認済み
  - [ ] PD-C-6: 外部 provider 経由 path は実 API 200 確認済み (deferred の場合は明示記録)
  - [ ] PD-C-6: ticket の AC / Architectural Invariants / out-of-scope が implementor によって書き換えられていない
  - [ ] PD-C-9: AC 裏取り Agent が各 AC の実質達成を verify 済み
  - [ ] PD-C-9: Surface Observer 観察済み (純 backend ticket では skip 可、判断を 1 行記録)
  - [ ] PD-C-9: ドキュメント更新済み (/update-docs)
  - [ ] PD-C-9: technical-reference.md 突合済み（下の「Technical reference 更新」欄に記録）
  - [ ] PD-C-10: ユーザが確認手順を実施し、クローズを承認した

  ## Technical reference 更新
  <!-- この ticket の差分に因果がある追記・上書きの内容、または「該当なし」＋理由を 1 行以上必ず書く。
       他 ticket 由来の記述を消したくなったら、消さずにここへ削除候補として記録する。 -->

  ## Discoveries
  <!-- 実装中に発見した想定外の事実を記録する。
       例: API の未文書化の挙動、ライブラリの制約、既存コードの隠れた依存関係。
       Implementation で対応した場合は実装ログに合わせて、ticket に書き戻しが必要な場合は PM に flag する。 -->

# Ticket template — pdh-dev SKILL の ticket 標準構造に準拠
# このテンプレートには frontmatter が含まれていない。
# YAML frontmatter (created_at, started_at, closed_at) は ticket.sh が自動挿入する。
#
# Acceptance Criteria にはプロダクトの観察可能な振る舞いだけを書く。
# プロセス要件 (レビュー済み、テストパス等) は SKILL.md のワークフローが保証し、
# note のセクション構造が通過証跡になるので、ticket の Acceptance Criteria には書かない。
default_content: |
  ## $$TICKET_NAME$$

  ### Why
  <!-- ユーザ価値・解きたい問題を 1〜3 行で書く。
       Product Brief の Problem / Solution のどの部分を担うか明記する。 -->

  ### What / Acceptance Criteria
  <!-- 完了を判定できる条件。プロダクトの観察可能な振る舞いだけを書く。
       coding agent はここを実装のゴールとして使う。
       例: 「/api/users に GET すると JSON 配列が返る」
       例: 「画面幅 375px 以下でメニューがハンバーガーに切り替わる」

       プロセス要件 (レビュー済み、テストパス等) はここには書かない。
       ワークフロー (SKILL.md) と作業ノート (note) が保証する。

       runtime で UX/Security invariant を強制する ticket では、AC に「runtime enforce の
       保証メカニズム」を 1 行明記する (例: editor 警告だけでなく 422 reject されること)。 -->
  - [ ] AC 1: ...
  - [ ] AC 2: ...

  ### Architectural Invariants check
  <!-- product-brief.md の Architectural Invariants と矛盾しないことを 1 行宣言する。
       矛盾しない場合: 「Hub stateless / Process immutable と矛盾しない」等。
       新規 Invariant を要求する場合: 実装を止めて Product Brief 更新から始める。 -->

  ### 確定判断 (Design Decisions)
  <!-- 既知の設計判断と理由を箇条書きで明示。
       例: - データ保存形式: data URI (Files API は将来 Epic、本 ticket では不要)
       例: - 423 reject ではなく 422: validation error として扱う -->
  -

  ### Out-of-scope
  <!-- やらないこと (scope creep 防止)。
       「ついでにやりそう」「次の ticket でやる」を明記する。 -->
  -

  ▼ 以下は該当する情報がある場合のみ ▼

  ### Implementation Notes
  <!-- ユーザの明示指示、またはユーザが会話で言及した事項のみ書く (関数名 / module 名レベルまで)。
       設計判断は「確定判断 (Design Decisions)」に書く。
       Coding Engineer は Implementation Notes が空でも実装できる責務を持つ。
       PM が自主的に実装詳細を書いてはならない (下流の自由度を奪う)。 -->

  ### Dependencies
  <!-- この ticket に着手するために完了が必要な他の ticket。
       「参考情報」ではなく「ブロッカー」だけ書く。なければ省略。
       ブロッカー = これが未完了だと実装・テストが物理的にできない依存。
       例: 「DB migration の ticket が先に必要」「認証 API が存在しないと結合できない」
       参考情報 (設計の参考にした ticket 等) は書かない。
       coding agent は未完了の依存がある場合、着手せず報告する。 -->

  ---
  Work notes: `$$NOTE_PATH$$`


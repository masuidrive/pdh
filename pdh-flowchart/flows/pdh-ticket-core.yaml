flow: pdh-ticket-core
version: 1
defaults:
  timeoutMinutes: 60
  maxAttempts: 2
  transitionLogFormat: "[{from}] -> [{to}]"
variants:
  light:
    initial: PD-C-3
    sequence:
      - PD-C-3
      - PD-C-5
      - PD-C-6
      - PD-C-7
      - PD-C-9
      - PD-C-10
  full:
    initial: PD-C-2
    sequence:
      - PD-C-2
      - PD-C-3
      - PD-C-4
      - PD-C-5
      - PD-C-6
      - PD-C-7
      - PD-C-8
      - PD-C-9
      - PD-C-10
steps:
  - id: PD-C-2
    provider: codex
    mode: read
    guards:
      - id: investigation-recorded
        type: note_section_updated
        path: current-note.md
        section: "PD-C-2. 調査結果"
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-2\\]"
    on_success: PD-C-3

  - id: PD-C-3
    provider: codex
    mode: read
    guards:
      - id: plan-recorded
        type: note_section_updated
        path: current-note.md
        section: "PD-C-3. 計画"
      - id: ticket-implementation-notes
        type: ticket_section_updated
        path: current-ticket.md
        section: Implementation Notes
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-3\\]"
    on_success:
      light: PD-C-5
      full: PD-C-4

  - id: PD-C-4
    provider: claude
    mode: review
    guards:
      - id: plan-review-recorded
        type: note_section_updated
        path: current-note.md
        section: "PD-C-4. 計画レビュー結果"
      - id: no-critical-major
        type: judgement_status
        artifactKind: plan_review
        accepted:
          - No Critical/Major
          - user_accepted
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-4\\]"
    on_success: PD-C-5
    on_failure: PD-C-3

  - id: PD-C-5
    provider: runtime
    mode: human
    guards:
      - id: gate-summary
        type: artifact_exists
        kind: human_gate_summary
      - id: explicit-approval
        type: human_approved
    human_gate:
      prompt: PD-C-5 implementation approval
      requiredSources:
        - current-ticket.md
        - current-note.md
    on_human_approved: PD-C-6
    on_human_rejected: PD-C-3
    on_human_changes_requested: PD-C-3

  - id: PD-C-6
    provider: codex
    mode: edit
    guards:
      - id: tests-pass
        type: command
        command: scripts/test-all.sh
        optional: true
      - id: note-updated
        type: note_section_updated
        path: current-note.md
        section: PD-C-6
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-6\\]"
    on_success: PD-C-7
    on_failure: PD-C-6

  - id: PD-C-7
    provider: claude
    mode: review
    guards:
      - id: quality-recorded
        type: note_section_updated
        path: current-note.md
        section: "PD-C-7. 品質検証結果"
      - id: no-critical-major
        type: judgement_status
        artifactKind: quality_review
        accepted:
          - No Critical/Major
          - user_accepted
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-7\\]"
    on_success: PD-C-8
    on_failure: PD-C-6

  - id: PD-C-8
    provider: claude
    mode: review
    guards:
      - id: purpose-recorded
        type: note_section_updated
        path: current-note.md
        section: "PD-C-8. 目的妥当性確認"
      - id: purpose-validation-accepted
        type: judgement_status
        artifactKind: purpose_validation
        accepted:
          - No Unverified
          - user_accepted
      - id: no-unverified
        type: ac_verification_table
        allowUnverified: false
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-8\\]"
    on_success: PD-C-9
    on_failure: PD-C-6

  - id: PD-C-9
    provider: codex
    mode: review
    guards:
      - id: process-checklist
        type: note_section_updated
        path: current-note.md
        section: "PD-C-9. プロセスチェックリスト"
      - id: ac-verification-table
        type: ac_verification_table
        allowUnverified: false
      - id: step-commit
        type: git_commit_exists
        pattern: "^\\[PD-C-9\\]"
    on_success: PD-C-10
    on_failure: PD-C-6

  - id: PD-C-10
    provider: runtime
    mode: human
    guards:
      - id: ac-verification-table
        type: ac_verification_table
        allowUnverified: false
      - id: gate-summary
        type: artifact_exists
        kind: human_gate_summary
      - id: explicit-approval
        type: human_approved
      - id: ticket-closed
        type: ticket_closed
    human_gate:
      prompt: PD-C-10 close approval
      requiredSources:
        - current-ticket.md
        - current-note.md
    on_human_approved: COMPLETE
    on_human_rejected: PD-C-6
    on_human_changes_requested: PD-C-6
